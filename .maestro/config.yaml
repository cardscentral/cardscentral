# Maestro workspace configuration
#
# NOTE: CI does NOT run this workspace directly. Flows 02–08 are stateful and
# sequential (02 adds the card that 03/04/05 view/edit/delete), so they must
# run in order on a single app instance. Running the *workspace* lets Maestro
# execute flows in parallel/independently, which breaks the chain — so CI
# passes the ordered flow list explicitly instead (see .github/workflows).
flows:
  - "flows/*"
executionOrder:
  continueOnFailure: false
  flowsOrder:
    - flows/01-country-selection.yaml

    - flows/02-add-card.yaml
    - flows/03-view-card-detail.yaml
    - flows/04-edit-card.yaml
    - flows/05-delete-card.yaml
    - flows/06-grid-view-toggle.yaml
    - flows/07-search-shops.yaml
    - flows/08-settings.yaml
