appId: com.cardscentral.app
---
# Flow: Import loyalty cards from a VoucherVault JSON export
# Precondition: Country already selected (relies on flow 01 running first)
#
# Uses the paste-JSON path (the primary, fully scriptable import method); the
# optional native file picker can't be reliably driven by Maestro in CI.
# Uses testIDs, not visible text, because the UI is in Slovak after SK is
# selected. "Tesco" is a brand name and renders the same in every language, so
# it is safe to assert as text for the resulting card.

- launchApp
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# Settings → Import
- tapOn:
    id: "tab-settings"
- extendedWaitUntil:
    visible:
      id: "settings-import"
    timeout: 5000
- tapOn:
    id: "settings-import"

# Import screen
- extendedWaitUntil:
    visible:
      id: "import-screen"
    timeout: 5000

# Paste a minimal VoucherVault export (merchant "Tesco" maps to the tesco shop)
- tapOn:
    id: "import-input"
- inputText: '[{"merchant":"Tesco","code":"9991234567890","format":"EAN13"}]'

# Dismiss the keyboard so import-button and subsequent elements are reachable.
# `hideKeyboard` is unreliable on iOS 26.x ("Couldn't hide the keyboard"), and
# the input is multiline so `pressKey: Enter` would corrupt the pasted JSON.
# Tapping the (non-interactive) title dismisses the keyboard instead — the
# ScrollView uses keyboardShouldPersistTaps="handled", so this tap only blurs
# the field without triggering any action.
- tapOn:
    id: "import-title"
# Run the import
- tapOn:
    id: "import-button"


# Success indicator should appear — this confirms the import completed and the
# card was persisted to storage. The "Done" button is also rendered at this
# point, confirming the full happy-path UI.
- extendedWaitUntil:
    visible:
      id: "import-success"
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "import-done"
    timeout: 5000
