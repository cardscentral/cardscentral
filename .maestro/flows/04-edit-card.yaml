appId: com.cardscentral.app
---
# Flow: Edit a card
# Precondition: A card exists (relies on flow 02 running first)

- launchApp
- extendedWaitUntil:
    visible:
      text: ".*My Tesco Card.*"
    timeout: 10000

# Tap on the card to view details
- tapOn:
    text: ".*My Tesco Card.*"

# Tap edit button
- extendedWaitUntil:
    visible:
      id: "card-detail-screen"
    timeout: 5000
- tapOn:
    id: "edit-card-button"

# Should see edit screen with pre-filled fields
- extendedWaitUntil:
    visible:
      id: "edit-nickname-input"
    timeout: 5000

# Clear and update nickname
- tapOn:
    id: "edit-nickname-input"
- eraseText: 13
- inputText: "Tesco Bratislava"

# Save
- tapOn:
    id: "save-edit-button"

# Should see updated card
- extendedWaitUntil:
    visible:
      text: ".*Tesco Bratislava.*"
    timeout: 5000
