appId: com.cardscentral.app
---
# Flow: Navigate to settings and verify options
# Precondition: Country selected
#
# Use testIDs, not visible English text. After SK is selected the UI is in
# Slovak, so literal strings like "Settings" / "Premium Feature" / "Version"
# never match.

# Retry the launch + initial wait: on iOS the app can intermittently crash on
# the very first launch after a fresh install (a startup timing race, not a
# functional bug — the identical .app passes on other runs). A relaunch
# reliably recovers. This flow is read-only (it only inspects Settings rows),
# so a retry is fully idempotent. (Same pattern as flow 03.)
- retry:
    maxRetries: 2
    commands:
      - launchApp
      - extendedWaitUntil:
          visible:
            id: "cards-list-screen"
          timeout: 10000

# Navigate to the Settings tab via its stable testID
- tapOn:
    id: "tab-settings"


# Should see the settings screen and its rows
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
- assertVisible:
    id: "settings-country"
- assertVisible:
    id: "settings-language"
- assertVisible:
    id: "settings-share-cards"
- assertVisible:
    id: "settings-import"
- assertVisible:
    id: "settings-version"

