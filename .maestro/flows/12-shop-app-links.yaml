appId: com.cardscentral.app
---
# Flow: Official retailer app links on the card detail screen
#
# Covers the "open the official app / get it from the store" feature. A shop
# resolves a store link ONLY from a VERIFIED entry in its YAML `apps` block
# (validated by scripts/verify-app-links.js); shops with no verified app show
# no store section at all. Shops with a known native app also get the "app
# available" badge + banner + "Open app" deep-link button.
#
# H&M has a verified native app on both platforms, so opening an H&M card must
# show all of these affordances.
#
# This flow is SELF-CONTAINED: it creates its own H&M card. Precondition: only
# country selection (flow 01).


- launchApp
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# ── Create an H&M card so this flow is independent of the 02–05 card chain ────
- tapOn:
    id: "add-card-button"
- extendedWaitUntil:
    visible:
      id: "shop-search-input"
    timeout: 5000
- scrollUntilVisible:
    element:
      id: "shop-select-hm"
    direction: DOWN
- tapOn:
    id: "shop-select-hm"


# Selecting a shop navigates to the card-details screen; on the Android
# emulator this transition can take longer than 5s, so allow a generous
# timeout for the card-number input to render.
- extendedWaitUntil:
    visible:
      id: "card-number-input"
    timeout: 10000

- tapOn:
    id: "card-number-input"
- inputText: "1234567890123"
- pressKey: Enter
- tapOn:
    id: "nickname-input"
- inputText: "My H&M Card"
- pressKey: Enter

- scrollUntilVisible:
    element:
      id: "save-card-button"
    direction: DOWN
- tapOn:
    id: "save-card-button"

# ── Open the card and assert the official-app affordances ────────────────────
- extendedWaitUntil:
    visible:
      text: ".*My H&M Card.*"
    timeout: 10000
- tapOn:
    text: ".*My H&M Card.*"

- extendedWaitUntil:
    visible:
      id: "card-detail-screen"
    timeout: 5000

# The official-app section + the single platform store/app button are present.
- assertVisible:
    id: "shop-app-section"
- assertVisible:
    id: "open-store-button"

# H&M has a known native app → the shop icon shows the app-available badge.

# (The button label switches between "Open app"/"Install app" by locale, so we
# assert the stable testID above rather than brittle localized text here.)
- assertVisible:
    id: "shop-app-badge"
