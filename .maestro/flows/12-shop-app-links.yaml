appId: com.cardscentral.app
---
# Flow: Official retailer app links on the card detail screen
#
# Covers the "open the official app / get it from the store" feature. Every
# shop resolves a store link (from its YAML `apps`, the central appLinks
# registry, or a name-based store search), and shops with a known native app
# also get the "app available" badge + banner + "Open app" deep-link button.
#
# Tesco has a known native app in the registry, so opening a Tesco card must
# show all of these affordances.
#
# This flow is SELF-CONTAINED: it creates its own Tesco card. It must not rely
# on the card from flow 02, because flow 05 (delete-card) deletes the Tesco card
# earlier in the sequence, so no Tesco card is guaranteed to exist by the time
# this flow runs. Precondition: only country selection (flow 01).

- launchApp
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# ── Create a Tesco card so this flow is independent of 02/05 ordering ─────────
- tapOn:
    id: "add-card-button"
- extendedWaitUntil:
    visible:
      id: "shop-search-input"
    timeout: 5000
- scrollUntilVisible:
    element:
      id: "shop-select-tesco"
    direction: DOWN
- tapOn:
    id: "shop-select-tesco"

- extendedWaitUntil:
    visible:
      id: "card-number-input"
    timeout: 5000
- tapOn:
    id: "card-number-input"
- inputText: "1234567890123"
- pressKey: Enter
- tapOn:
    id: "nickname-input"
- inputText: "My Tesco Card"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "save-card-button"
    direction: DOWN
- tapOn:
    id: "save-card-button"

# ── Open the card and assert the official-app affordances ────────────────────
- extendedWaitUntil:
    visible:
      text: ".*My Tesco Card.*"
    timeout: 10000
- tapOn:
    text: ".*My Tesco Card.*"
- extendedWaitUntil:
    visible:
      id: "card-detail-screen"
    timeout: 5000

# The official-app section + the single platform store/app button are present.
- assertVisible:
    id: "shop-app-section"
- assertVisible:
    id: "open-store-button"

# Tesco has a known native app → the shop icon shows the app-available badge.
# (The button label switches between "Open app"/"Install app" by locale, so we
# assert the stable testID above rather than brittle localized text here.)
- assertVisible:
    id: "shop-app-badge"
