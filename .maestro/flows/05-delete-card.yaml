appId: com.cardscentral.app
---
# Flow: Delete a card
# Precondition: A card exists (relies on flow 02 or 04 running first)

- launchApp
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# Tap on the first card visible
- tapOn:
    text: ".*Tesco.*"

# Tap delete button on detail screen
- extendedWaitUntil:
    visible:
      id: "card-detail-screen"
    timeout: 5000
- tapOn:
    id: "delete-card-button"

# Confirm deletion in native Alert (buttons are in English: "Delete")
- tapOn: "Delete"

# Should return to cards list
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000
