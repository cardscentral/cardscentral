appId: com.cardscentral.app
---
# Flow: Country Selection (First Launch)
- clearState
- launchApp
- extendedWaitUntil:
    visible: "Select your country"
    timeout: 10000
- assertVisible:
    id: "country-SK"
- tapOn:
    id: "country-SK"
# After selecting country, should see the main cards screen
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000
