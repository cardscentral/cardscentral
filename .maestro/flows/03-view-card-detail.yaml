appId: com.cardscentral.app
---
# Flow: View card detail
# Precondition: A card exists (relies on flow 02 running first)

# Retry the whole flow: on iOS the detail screen can intermittently crash on
# the very first launch after a fresh install (a startup timing race, not a
# functional bug). A relaunch reliably recovers, so wrap the interaction in a
# retry rather than failing the suite on a transient native crash.
- retry:
    maxRetries: 2
    commands:
      - launchApp
      - extendedWaitUntil:
          visible:
            text: ".*My Tesco Card.*"
          timeout: 10000

      # Tap on the card to view details
      - tapOn:
          text: ".*My Tesco Card.*"

      # Should see card detail screen with barcode
      - extendedWaitUntil:
          visible:
            id: "card-detail-screen"
          timeout: 5000
      - assertVisible:
          text: ".*1234567890123.*"
