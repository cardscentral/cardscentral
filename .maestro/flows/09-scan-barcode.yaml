appId: com.cardscentral.app
---
# Flow: Scan barcode from gallery image
# Tests the image-based barcode recognition flow

# Inject QR code image into simulator photo library
- addMedia:
    - ../test-assets/qr-test.png

- launchApp
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# Tap add card
- tapOn:
    id: "add-card-button"
- extendedWaitUntil:
    visible: "Select Shop"
    timeout: 5000

# Select Tesco shop
- scrollUntilVisible:
    element:
      id: "shop-select-tesco"
    direction: DOWN
- tapOn:
    id: "shop-select-tesco"

# Scroll to see scan button
- scrollUntilVisible:
    element:
      id: "scan-barcode-button"
    direction: DOWN

# Tap scan button to navigate to scan screen
- tapOn:
    id: "scan-barcode-button"

# Wait for scan screen to appear (look for the gallery button)
- extendedWaitUntil:
    visible:
      id: "pick-from-gallery-button"
    timeout: 5000

# Tap "Pick from Gallery" button
- tapOn:
    id: "pick-from-gallery-button"

# The photo picker should appear - select the first (most recent) photo
- extendedWaitUntil:
    visible:
      text: ".*Photo.*15 June.*"
    timeout: 5000
- tapOn:
    text: ".*Photo.*15 June.*08:05"
    index: 0

# After picking, the barcode should be scanned and we navigate back to AddCard
# The scanned code should populate the card number field
- extendedWaitUntil:
    visible: "Select Shop"
    timeout: 10000
