appId: com.cardscentral.app
---
# Flow: Add a new loyalty card
# Precondition: Country already selected (relies on flow 01 running first)

- launchApp
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# Navigate to add card via FAB button
- tapOn:
    id: "add-card-button"

# Should see shop selection (Slovak: "Vybrať obchod" when SK country is selected)
- extendedWaitUntil:
    visible:
      id: "shop-search-input"
    timeout: 5000

# Select a shop (Tesco) via the search box rather than scrolling the grid. On
# the Android emulator, `scrollUntilVisible` can leave the target tile at the
# very edge of the viewport with the scroll still settling, so the following
# `tapOn` lands on a mid-animation frame and never navigates to the card-details
# screen (the `card-number-input` wait then times out). Filtering by text puts a
# single, fully on-screen tile at the top, which removes the scroll/tap race.
- tapOn:
    id: "shop-search-input"
- inputText: "Tesco"
- extendedWaitUntil:
    visible:
      id: "shop-select-tesco"
    timeout: 5000
- hideKeyboard
- tapOn:
    id: "shop-select-tesco"

# Wait for card details screen to appear (allow a generous timeout for the
# Android navigation transition to settle).
- extendedWaitUntil:
    visible:
      id: "card-number-input"
    timeout: 10000

# Enter card number
- tapOn:
    id: "card-number-input"
- inputText: "1234567890123"
- pressKey: Enter

# Add a nickname
- tapOn:
    id: "nickname-input"
- inputText: "My Tesco Card"
- pressKey: Enter

# Save the card
- scrollUntilVisible:
    element:
      id: "save-card-button"
    direction: DOWN
- tapOn:
    id: "save-card-button"

# Should return to cards list and see the new card
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000
- assertVisible:
    text: ".*My Tesco Card.*"
