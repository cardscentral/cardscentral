appId: com.cardscentral.app
---
# Flow: Add a new loyalty card
# Precondition: Country already selected (relies on flow 01 running first)

- launchApp
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# Navigate to add card via FAB button
- tapOn:
    id: "add-card-button"

# Should see shop selection (Slovak: "Vybrať obchod" when SK country is selected)
- extendedWaitUntil:
    visible:
      id: "shop-search-input"
    timeout: 5000

# Select a shop (Tesco) - navigates to card details screen
- scrollUntilVisible:
    element:
      id: "shop-select-tesco"
    direction: DOWN
- tapOn:
    id: "shop-select-tesco"

# Wait for card details screen to appear
- extendedWaitUntil:
    visible:
      id: "card-number-input"
    timeout: 5000

# Enter card number
- tapOn:
    id: "card-number-input"
- inputText: "1234567890123"
- pressKey: Enter

# Add a nickname
- tapOn:
    id: "nickname-input"
- inputText: "My Tesco Card"
- pressKey: Enter

# Save the card
- scrollUntilVisible:
    element:
      id: "save-card-button"
    direction: DOWN
- tapOn:
    id: "save-card-button"

# Should return to cards list and see the new card
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000
- assertVisible:
    text: ".*My Tesco Card.*"
