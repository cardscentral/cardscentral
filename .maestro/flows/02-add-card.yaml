appId: com.cardscentral.app
---
# Flow: Add a new loyalty card
# Precondition: Country already selected (relies on flow 01 running first)

- launchApp
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# Navigate to add card via FAB button
- tapOn:
    id: "add-card-button"

# Should see shop selection
- extendedWaitUntil:
    visible: "Select Shop"
    timeout: 5000

# Select a shop (Tesco)
- scrollUntilVisible:
    element:
      id: "shop-select-tesco"
    direction: DOWN
- tapOn:
    id: "shop-select-tesco"

# Scroll to card number input and enter value
- scrollUntilVisible:
    element:
      id: "card-number-input"
    direction: DOWN
- tapOn:
    id: "card-number-input"
- inputText: "1234567890123"
- hideKeyboard

# Add a nickname
- scrollUntilVisible:
    element:
      id: "nickname-input"
    direction: DOWN
- tapOn:
    id: "nickname-input"
- inputText: "My Tesco Card"
- hideKeyboard

# Save the card
- scrollUntilVisible:
    element:
      id: "save-card-button"
    direction: DOWN
- tapOn:
    id: "save-card-button"

# Should return to cards list and see the new card
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000
- assertVisible:
    text: ".*My Tesco Card.*"
