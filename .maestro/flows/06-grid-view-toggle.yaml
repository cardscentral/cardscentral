appId: com.cardscentral.app
---
# Flow: Toggle between list and grid view
# Precondition: Country selected, need to add a card first

- launchApp
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# Add a card so we can see the toggle
- tapOn:
    id: "add-card-button"
# Use the search input's testID, not English "Select Shop" text — after SK is
# selected the UI is in Slovak, so the literal English string never matches.
- extendedWaitUntil:
    visible:
      id: "shop-search-input"
    timeout: 5000

# Select Tesco via the search box rather than scrolling the grid. On the
# Android emulator, `scrollUntilVisible` can leave the tile at the very edge of
# the viewport with the scroll still settling, so the following `tapOn` lands on
# a mid-animation frame and never navigates (the `card-number-input` wait then
# times out). Filtering by text puts a single, fully on-screen tile at the top,
# which removes the scroll/tap race.
- tapOn:
    id: "shop-search-input"
- inputText: "Tesco"
- extendedWaitUntil:
    visible:
      id: "shop-select-tesco"
    timeout: 5000
- hideKeyboard
- tapOn:
    id: "shop-select-tesco"
# Selecting a shop navigates to the card-details screen. Wait for that
# navigation to finish before interacting.
- extendedWaitUntil:
    visible:
      id: "card-number-input"
    timeout: 10000
- tapOn:
    id: "card-number-input"

- inputText: "9999888877776666"
# `hideKeyboard` can fail on iOS 26.5; pressing Enter is reliable.
- pressKey: Enter

- scrollUntilVisible:
    element:
      id: "save-card-button"
    direction: DOWN
- tapOn:
    id: "save-card-button"

# Wait for cards list with the card
- extendedWaitUntil:
    visible:
      id: "cards-list-screen"
    timeout: 10000

# View toggle should be visible now
- assertVisible:
    id: "view-toggle"

# Switch to grid view
- tapOn:
    id: "view-toggle-grid"

# The card should still be visible (as grid item with shop name)
- assertVisible:
    text: ".*Tesco.*"

# Switch back to list view
- tapOn:
    id: "view-toggle-list"

# Card is still visible in list view
- assertVisible:
    text: ".*Tesco.*"
