name: CI

on:
  push:
    branches: [main, initial]
  pull_request:
    branches: [main, initial]

jobs:
  # ──────────────────────────────────────────────────────────
  # Lint, typecheck, validate shop configs
  # ──────────────────────────────────────────────────────────
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache fetched logos
        uses: actions/cache@v4
        with:
          path: assets/logos
          key: logos-${{ hashFiles('src/config/shops/*.yaml') }}

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos
      - run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────
  # E2E Tests - iOS (Maestro)
  # ──────────────────────────────────────────────────────────
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-15
    needs: checks
    steps:
      - uses: actions/checkout@v4

      # Expo SDK 56's SPM packages (expo-modules-jsi, expo-modules-macros-plugin)
      # declare `swift-tools-version:6.2`. Swift 6.2 ships with Xcode 26 — NOT
      # Xcode 16.4 (Swift 6.1) or 16.2 (Swift 6.0). Older Xcode fails package
      # resolution (including the nested xcodebuild run by the ExpoModulesJSI
      # "Build … xcframework" build phase) with:
      #   "package 'apple' is using Swift tools version 6.2.0 but the installed
      #    version is 6.1.0".
      # Xcode 26.x is available on the macos-15 runner image.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'




      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm



      - name: Cache fetched logos
        uses: actions/cache@v4
        with:
          path: assets/logos
          key: logos-${{ hashFiles('src/config/shops/*.yaml') }}

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos

      # Install Maestro
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Build iOS app for simulator

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      # Build for the simulator SDK without targeting a specific device.
      # 'generic/platform=iOS Simulator' avoids depending on a particular
      # pre-created simulator existing on the runner.
      #
      # IMPORTANT: derivedDataPath must NOT be `build`. React Native writes its
      # codegen output to `ios/build/generated/ios/ReactCodegen` (a fixed path),
      # which `pod install` populates during prebuild. Pointing DerivedData at
      # `ios/build` makes Xcode manage that same directory and wipe the codegen
      # files on a clean build, causing "Build input file cannot be found:
      # …/ReactCodegen/<lib>/<lib>-generated.mm". Use a separate path instead.
      - name: Build iOS (Debug)
        run: |
          cd ios && xcodebuild -workspace CardsCentral.xcworkspace \
            -scheme CardsCentral \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath derived_data \
            build


      # Create + boot a concrete simulator, then install and launch the app.
      # The runner may not ship a pre-created "iPhone 16" device, so create one
      # explicitly against an available runtime.
      - name: Boot Simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes ios -j | python3 -c "import json,sys;rs=[r for r in json.load(sys.stdin)['runtimes'] if r['isAvailable']];print(rs[-1]['identifier'])")
          echo "Using runtime: $RUNTIME"
          UDID=$(xcrun simctl create 'ci-iphone' 'iPhone 16' "$RUNTIME")
          echo "Created simulator: $UDID"
          xcrun simctl boot "$UDID"
          # `simctl boot` returns before the OS is ready; wait so the subsequent
          # install/launch don't race against an unbooted system.
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" ios/derived_data/Build/Products/Debug-iphonesimulator/CardsCentral.app
          xcrun simctl launch "$UDID" com.cardscentral.app




      # Run Maestro E2E tests
      - name: Run Maestro E2E Tests
        run: maestro test .maestro/flows/ --format junit --output report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-ios-results
          path: report.xml

  # ──────────────────────────────────────────────────────────
  # E2E Tests - Android (Maestro)
  # ──────────────────────────────────────────────────────────
  e2e-android:
    name: E2E Tests (Android)
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      # The Ubuntu runner's disk fills up: a full prebuild + gradle build (NDK,
      # CMake, build-tools, a ~230MB APK and Gradle caches) leaves too little
      # room for the emulator system image, which then fails with "No space left
      # on device" and the emulator never boots ("could not connect to TCP port
      # 5554"). Reclaim space by removing large preinstalled toolchains we don't
      # use before building.
      - name: Free disk space
        run: |
          echo "Disk before cleanup:"; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
            /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/local/share/chromium \
            /usr/lib/jvm /usr/local/lib/node_modules 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          echo "Disk after cleanup:"; df -h /

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 17

      - name: Cache fetched logos
        uses: actions/cache@v4
        with:
          path: assets/logos
          key: logos-${{ hashFiles('src/config/shops/*.yaml') }}

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos

      # Install Maestro
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Build Android app
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Android (Debug)
        run: cd android && ./gradlew assembleDebug

      # Start emulator and run tests
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/flows/ --format junit --output report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-android-results
          path: report.xml
