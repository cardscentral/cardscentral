name: CI

on:
  push:
    branches: [main, initial]
  pull_request:
    branches: [main, initial]

jobs:
  # ──────────────────────────────────────────────────────────
  # Lint, typecheck, validate shop configs
  # ──────────────────────────────────────────────────────────
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos
      - run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────
  # E2E Tests - iOS (Maestro)
  # ──────────────────────────────────────────────────────────
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-14
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos

      # Install Maestro
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Build iOS app for simulator
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Build iOS (Debug)
        run: |
          cd ios && xcodebuild -workspace cardscentral.xcworkspace \
            -scheme cardscentral \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            build

      # Boot simulator and install app
      - name: Boot Simulator
        run: |
          xcrun simctl boot 'iPhone 16' || true
          xcrun simctl install booted ios/build/Build/Products/Debug-iphonesimulator/cardscentral.app
          xcrun simctl launch booted com.cardscentral.app

      # Run Maestro E2E tests
      - name: Run Maestro E2E Tests
        run: maestro test .maestro/flows/ --format junit --output report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-ios-results
          path: report.xml

  # ──────────────────────────────────────────────────────────
  # E2E Tests - Android (Maestro)
  # ──────────────────────────────────────────────────────────
  e2e-android:
    name: E2E Tests (Android)
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos

      # Install Maestro
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Build Android app
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Android (Debug)
        run: cd android && ./gradlew assembleDebug

      # Start emulator and run tests
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/flows/ --format junit --output report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-android-results
          path: report.xml
