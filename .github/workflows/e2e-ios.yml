name: E2E iOS

on:
  push:
    branches: [main, initial]
  pull_request:
    branches: [main, initial]

jobs:
  # ──────────────────────────────────────────────────────────
  # E2E Tests - iOS (Maestro)
  # ──────────────────────────────────────────────────────────
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-15
    # Opt out of Maestro's anonymous analytics for all steps in this job.
    env:
      MAESTRO_CLI_NO_ANALYTICS: '1'
      # The logos dir is restored from cache (keyed on the shop YAMLs), so a
      # present logo is already current — skip the multi-minute network refetch.
      FETCH_LOGOS_SKIP_STALE: '1'
    steps:

      - uses: actions/checkout@v4

      # Expo SDK 56 needs a recent Swift on two counts, so pin Xcode 26.1+:
      #   1. Its SPM packages (expo-modules-jsi, expo-modules-macros-plugin)
      #      declare `swift-tools-version:6.2` → fails on < Xcode 26 (Swift 6.1/6.0)
      #      during package resolution (incl. the nested xcodebuild in the
      #      ExpoModulesJSI "Build … xcframework" phase): "package 'apple' is
      #      using Swift tools version 6.2.0 but the installed version is 6.1.0".
      #   2. expo-modules-jsi source uses `weak let` (SE-0481), which only
      #      *compiles* on Swift 6.3 (Xcode 26.1+). Xcode 26.0.1 (Swift 6.2)
      #      satisfies the tools gate but fails to build with: "'weak' must be a
      #      mutable variable, because it may change at runtime".
      # So 26.0.1 is NOT enough. The macos-15 image ships 26.0.1 / 26.1.1 / 26.2
      # / 26.3 — pin to 26.3 (Swift 6.3), the newest available on the image.

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache fetched logos
        uses: actions/cache@v4
        with:
          path: assets/logos
          key: logos-v2-${{ hashFiles('src/config/shops/*.yaml') }}

      # `ios/` is regenerated by `expo prebuild --clean`, so we can't cache the
      # project dir. Instead cache the stable, content-addressed toolchain
      # caches that dominate a cold build:
      #   - CocoaPods spec repo + downloaded pods cache (pod install)
      #   - Swift Package Manager clones/cache (SPM resolution, incl. the
      #     ExpoModulesJSI xcframework build phase)
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods/repos
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # Cache the Maestro CLI so we skip the network install on cache hits.
      - name: Cache Maestro CLI
        id: cache-maestro
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}-v1

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos

      - name: Install Maestro
        if: steps.cache-maestro.outputs.cache-hit != 'true'
        run: curl -fsSL "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Fingerprint-based .app caching ─────────────────────────────────────
      # The xcodebuild release build takes ~14 min. Cache the simulator .app
      # keyed on files that affect the native build. When the fingerprint
      # matches we skip prebuild+build entirely.
      # Compute the fingerprint from the *committed* tree (git ls-tree -r HEAD
      # lists blob object IDs) so it's fully deterministic and immune to
      # working-tree mutations from earlier steps (npm ci, generate:shops/icons,
      # fetch:logos). We exclude build-time artifacts that vary across runs:
      #   - *.generated.* (produced by generate:shops/icons)
      #   - assets/logos/** (fetched by fetch:logos; Google returns varying bytes)
      # Identical committed source ⇒ identical key ⇒ the ~14m build is skipped.
      - name: Compute build fingerprint
        id: build-fingerprint
        run: |
          HASH=$(git ls-tree -r HEAD -- \
            src/ assets/ app.json package-lock.json index.ts App.tsx scripts/ \
            | grep -vE '\.generated\.|assets/logos/' \
            | shasum -a 256 | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Build fingerprint: $HASH"

      # Include the Xcode version in the cache key. The cached .app is a
      # simulator binary built against a specific toolchain/simulator runtime;
      # when the runner image bumps Xcode (and thus the newest simulator
      # runtime we boot below), a previously-cached .app can install but fail
      # to render (blank screen → every Maestro assertion fails). Keying on the
      # Xcode version invalidates such stale .apps so we rebuild instead of
      # shipping a broken binary.
      - name: Resolve Xcode version
        id: xcode-version
        run: echo "version=$(xcodebuild -version | head -1 | tr ' ' '-')" >> "$GITHUB_OUTPUT"

      - name: Cache iOS app
        id: cache-ios-app
        uses: actions/cache@v4
        with:
          path: cached-app/CardsCentral.app
          key: ios-app-${{ steps.xcode-version.outputs.version }}-${{ steps.build-fingerprint.outputs.hash }}


      - name: Prebuild iOS
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform ios --clean

      # Build for the simulator SDK without targeting a specific device.
      # 'generic/platform=iOS Simulator' avoids depending on a particular
      # pre-created simulator existing on the runner.
      #
      # IMPORTANT: derivedDataPath must NOT be `build`. React Native writes its
      # codegen output to `ios/build/generated/ios/ReactCodegen` (a fixed path),
      # which `pod install` populates during prebuild. Pointing DerivedData at
      # `ios/build` makes Xcode manage that same directory and wipe the codegen
      # files on a clean build, causing "Build input file cannot be found:
      # …/ReactCodegen/<lib>/<lib>-generated.mm". Use a separate path instead.
      # Build *Release*, not Debug. A Debug RN/Expo build loads its JS bundle
      # from a running Metro server (localhost:8081); CI has no Metro, so a
      # Debug app launches to a blank/red screen and every Maestro assertion
      # fails ("Select your country" never appears). Release runs the "Bundle
      # React Native code and images" phase, embedding the JS into the .app so
      # it's self-contained. (Simulator builds need no code signing.)
      - name: Build iOS (Release)
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        run: |
          cd ios && xcodebuild -workspace CardsCentral.xcworkspace \
            -scheme CardsCentral \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath derived_data \
            build

      - name: Store .app in cache dir
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        run: |
          mkdir -p cached-app
          cp -R ios/derived_data/Build/Products/Release-iphonesimulator/CardsCentral.app cached-app/CardsCentral.app

      # Create + boot a concrete simulator, then install and launch the app.
      # The runner may not ship a pre-created "iPhone 16" device, so create one
      # explicitly against an available runtime.
      #
      # This step also acts as a smoke test / pre-warm: it launches the app and
      # verifies the process actually stays alive. On iOS the app can crash on
      # the very first launch after a fresh install (a known startup timing
      # race — see the `retry` blocks in the Maestro flows). If we proceed into
      # Maestro against a simulator where the app is dead / never rendered,
      # EVERY flow fails at once (e.g. "Select your country" never appears),
      # turning a transient hiccup into a red build. Retrying the launch here
      # absorbs that race before the test suite starts, and fails fast with a
      # clear message if the app genuinely cannot run.
      - name: Boot Simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes ios -j | python3 -c "import json,sys;rs=[r for r in json.load(sys.stdin)['runtimes'] if r['isAvailable']];print(rs[-1]['identifier'])")
          echo "Using runtime: $RUNTIME"
          UDID=$(xcrun simctl create 'ci-iphone' 'iPhone 16' "$RUNTIME")
          echo "Created simulator: $UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID"
          # `simctl boot` returns before the OS is ready; wait so the subsequent
          # install/launch don't race against an unbooted system.
          xcrun simctl bootstatus "$UDID" -b

          APP_PATH="cached-app/CardsCentral.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="ios/derived_data/Build/Products/Release-iphonesimulator/CardsCentral.app"
          fi
          xcrun simctl install "$UDID" "$APP_PATH"

          # Launch and verify the app is actually running. `simctl launch`
          # returns a PID even when the app then crashes milliseconds later, so
          # a returned PID is NOT proof of a healthy launch. Poll `simctl
          # spawn launchctl print` for the app's service to confirm it stays
          # up, and retry the launch a few times to ride out the startup race.
          launch_and_verify() {
            xcrun simctl launch "$UDID" com.cardscentral.app || return 1
            for _ in $(seq 1 10); do
              sleep 2
              if xcrun simctl spawn "$UDID" launchctl print system 2>/dev/null \
                   | grep -q "UIKitApplication:com.cardscentral.app"; then
                return 0
              fi
            done
            return 1
          }

          for attempt in 1 2 3; do
            echo "App launch attempt $attempt…"
            if launch_and_verify; then
              echo "App launched and is running."
              exit 0
            fi
            echo "App did not stay running; terminating and retrying."
            xcrun simctl terminate "$UDID" com.cardscentral.app 2>/dev/null || true
          done

          echo "::error::App failed to launch/stay running on the simulator after 3 attempts."
          exit 1


      # Pass the flow files explicitly (NOT the whole `.maestro` workspace, which
      # Maestro may run in parallel/independently). Flows 02–08 are stateful and
      # sequential — 02 adds the card that 03/04/05 view/edit/delete — so they
      # must run in this order on one app instance. Listing them runs them
      # sequentially in order. Flow 10 (import-vouchervault) is portable
      # (paste-only, no native assets) so it's included. Two flows are omitted:
      #   - 09 (scan-barcode): needs an `addMedia` fixture + hardcoded gallery date.
      #   - 11 (language-change): starts with `clearState: true`, which would wipe
      #     the card that flow 12 (shop-app-links) depends on; it's independent.
      # Flow 14 (theme) runs last: it stops/relaunches the app (without clearing
      # state) to verify persistence, so it's placed after the card-dependent
      # chain to avoid disturbing it.


      # Run the ordered flow list, retrying the WHOLE suite on failure.
      #
      # Flows 02–08 are stateful and sequential (02 adds the card that
      # 03/04/05 view/edit/delete, 05 deletes it). The failure we keep hitting
      # is a transient iOS startup crash mid-chain: the app crashes during, say,
      # flow 02, which then cascades into 03/04/05 (the card was never added).
      # This is a flaky-environment problem, not a product bug — a rerun passes.
      #
      # A naïve suite rerun would be unsafe (a leftover card from a partial
      # first attempt would break the retry's 02→03 chain). But the list ALWAYS
      # starts with flow 01, which begins with `clearState` — so every attempt
      # (including retries) wipes app state before flow 02 runs. That makes the
      # whole-suite retry idempotent: each attempt starts from a clean install.
      #
      # We retry at the shell level because the cached Maestro CLI predates the
      # `--retry-if-failed` flag. Only the JUnit report from the final attempt
      # is kept (matching the actual pass/fail of the run).
      - name: Run Maestro E2E Tests
        run: |
          set +e
          FLOWS=(
            .maestro/flows/01-country-selection.yaml
            .maestro/flows/02-add-card.yaml
            .maestro/flows/03-view-card-detail.yaml
            .maestro/flows/04-edit-card.yaml
            .maestro/flows/05-delete-card.yaml
            .maestro/flows/06-grid-view-toggle.yaml
            .maestro/flows/07-search-shops.yaml
            .maestro/flows/08-settings.yaml
            .maestro/flows/10-import-vouchervault.yaml
            .maestro/flows/12-shop-app-links.yaml
            .maestro/flows/14-theme.yaml
          )
          attempts=2
          for attempt in $(seq 1 "$attempts"); do
            echo "── Maestro suite attempt $attempt/$attempts ──"
            maestro test "${FLOWS[@]}" --format junit --output report.xml
            status=$?
            if [ "$status" -eq 0 ]; then
              echo "Maestro suite passed on attempt $attempt."
              exit 0
            fi
            echo "Maestro suite failed on attempt $attempt (exit $status)."
          done
          echo "::error::Maestro suite failed after $attempts attempts."
          exit "$status"




      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-ios-results
          path: report.xml
