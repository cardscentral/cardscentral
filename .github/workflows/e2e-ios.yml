name: E2E iOS

on:
  push:
    branches: [main, initial]
  pull_request:
    branches: [main, initial]

jobs:
  # ──────────────────────────────────────────────────────────
  # E2E Tests - iOS (Maestro)
  # ──────────────────────────────────────────────────────────
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-15
    # Opt out of Maestro's anonymous analytics for all steps in this job.
    env:
      MAESTRO_CLI_NO_ANALYTICS: '1'
    steps:

      - uses: actions/checkout@v4

      # Expo SDK 56 needs a recent Swift on two counts, so pin Xcode 26.1+:
      #   1. Its SPM packages (expo-modules-jsi, expo-modules-macros-plugin)
      #      declare `swift-tools-version:6.2` → fails on < Xcode 26 (Swift 6.1/6.0)
      #      during package resolution (incl. the nested xcodebuild in the
      #      ExpoModulesJSI "Build … xcframework" phase): "package 'apple' is
      #      using Swift tools version 6.2.0 but the installed version is 6.1.0".
      #   2. expo-modules-jsi source uses `weak let` (SE-0481), which only
      #      *compiles* on Swift 6.3 (Xcode 26.1+). Xcode 26.0.1 (Swift 6.2)
      #      satisfies the tools gate but fails to build with: "'weak' must be a
      #      mutable variable, because it may change at runtime".
      # So 26.0.1 is NOT enough. The macos-15 image ships 26.0.1 / 26.1.1 / 26.2
      # / 26.3 — pin to 26.3 (Swift 6.3), the newest available on the image.

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache fetched logos
        uses: actions/cache@v4
        with:
          path: assets/logos
          key: logos-v2-${{ hashFiles('src/config/shops/*.yaml') }}

      # `ios/` is regenerated by `expo prebuild --clean`, so we can't cache the
      # project dir. Instead cache the stable, content-addressed toolchain
      # caches that dominate a cold build:
      #   - CocoaPods spec repo + downloaded pods cache (pod install)
      #   - Swift Package Manager clones/cache (SPM resolution, incl. the
      #     ExpoModulesJSI xcframework build phase)
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods/repos
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # Cache the Maestro CLI so we skip the network install on cache hits.
      - name: Cache Maestro CLI
        id: cache-maestro
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}-v1

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos

      - name: Install Maestro
        if: steps.cache-maestro.outputs.cache-hit != 'true'
        run: curl -fsSL "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Fingerprint-based .app caching ─────────────────────────────────────
      # The xcodebuild release build takes ~14 min. Cache the simulator .app
      # keyed on files that affect the native build. When the fingerprint
      # matches we skip prebuild+build entirely.
      # Compute the fingerprint from git-tracked source ONLY. We must exclude
      # build-time artifacts (assets/logos/* fetched by fetch:logos, and
      # *.generated.* produced by generate:shops/icons) because those are
      # non-deterministic across runs and would make the cache always miss.
      # `git ls-files` lists committed files; we hash their contents + the
      # generator scripts so the .app rebuilds whenever real inputs change.
      - name: Compute build fingerprint
        id: build-fingerprint
        run: |
          HASH=$(git ls-files \
            'src/' 'assets/' 'app.json' 'package-lock.json' 'index.ts' 'App.tsx' 'scripts/' \
            ':!:*.generated.*' ':!:assets/logos/**' \
            | sort | xargs shasum -a 256 | shasum -a 256 | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Build fingerprint: $HASH"

      - name: Cache iOS app
        id: cache-ios-app
        uses: actions/cache@v4
        with:
          path: cached-app/CardsCentral.app
          key: ios-app-${{ steps.build-fingerprint.outputs.hash }}

      - name: Prebuild iOS
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform ios --clean

      # Build for the simulator SDK without targeting a specific device.
      # 'generic/platform=iOS Simulator' avoids depending on a particular
      # pre-created simulator existing on the runner.
      #
      # IMPORTANT: derivedDataPath must NOT be `build`. React Native writes its
      # codegen output to `ios/build/generated/ios/ReactCodegen` (a fixed path),
      # which `pod install` populates during prebuild. Pointing DerivedData at
      # `ios/build` makes Xcode manage that same directory and wipe the codegen
      # files on a clean build, causing "Build input file cannot be found:
      # …/ReactCodegen/<lib>/<lib>-generated.mm". Use a separate path instead.
      # Build *Release*, not Debug. A Debug RN/Expo build loads its JS bundle
      # from a running Metro server (localhost:8081); CI has no Metro, so a
      # Debug app launches to a blank/red screen and every Maestro assertion
      # fails ("Select your country" never appears). Release runs the "Bundle
      # React Native code and images" phase, embedding the JS into the .app so
      # it's self-contained. (Simulator builds need no code signing.)
      - name: Build iOS (Release)
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        run: |
          cd ios && xcodebuild -workspace CardsCentral.xcworkspace \
            -scheme CardsCentral \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath derived_data \
            build

      - name: Store .app in cache dir
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        run: |
          mkdir -p cached-app
          cp -R ios/derived_data/Build/Products/Release-iphonesimulator/CardsCentral.app cached-app/CardsCentral.app

      # Create + boot a concrete simulator, then install and launch the app.
      # The runner may not ship a pre-created "iPhone 16" device, so create one
      # explicitly against an available runtime.
      - name: Boot Simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes ios -j | python3 -c "import json,sys;rs=[r for r in json.load(sys.stdin)['runtimes'] if r['isAvailable']];print(rs[-1]['identifier'])")
          echo "Using runtime: $RUNTIME"
          UDID=$(xcrun simctl create 'ci-iphone' 'iPhone 16' "$RUNTIME")
          echo "Created simulator: $UDID"
          xcrun simctl boot "$UDID"
          # `simctl boot` returns before the OS is ready; wait so the subsequent
          # install/launch don't race against an unbooted system.
          xcrun simctl bootstatus "$UDID" -b

          APP_PATH="cached-app/CardsCentral.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="ios/derived_data/Build/Products/Release-iphonesimulator/CardsCentral.app"
          fi
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" com.cardscentral.app

      # Pass the flow files explicitly (NOT the whole `.maestro` workspace, which
      # Maestro may run in parallel/independently). Flows 02–08 are stateful and
      # sequential — 02 adds the card that 03/04/05 view/edit/delete — so they
      # must run in this order on one app instance. Listing them runs them
      # sequentially in order. Flow 10 (import-vouchervault) is portable
      # (paste-only, no native assets) so it's included; only the non-portable
      # 09 (scan-barcode: needs an `addMedia` fixture + hardcoded gallery date)
      # is omitted.

      - name: Run Maestro E2E Tests
        run: |
          maestro test \
            .maestro/flows/01-country-selection.yaml \
            .maestro/flows/02-add-card.yaml \
            .maestro/flows/03-view-card-detail.yaml \
            .maestro/flows/04-edit-card.yaml \
            .maestro/flows/05-delete-card.yaml \
            .maestro/flows/06-grid-view-toggle.yaml \
            .maestro/flows/07-search-shops.yaml \
            .maestro/flows/08-settings.yaml \
            .maestro/flows/10-import-vouchervault.yaml \
            --format junit --output report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-ios-results
          path: report.xml
