name: E2E Android

on:
  push:
    branches: [main, initial]
  pull_request:
    branches: [main, initial]

jobs:
  # ──────────────────────────────────────────────────────────
  # E2E Tests - Android (Maestro)
  # ──────────────────────────────────────────────────────────
  e2e-android:
    name: E2E Tests (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Ubuntu runner's disk fills up: a full prebuild + gradle build (NDK,
      # CMake, build-tools, a ~230MB APK and Gradle caches) leaves too little
      # room for the emulator system image, which then fails with "No space left
      # on device" and the emulator never boots ("could not connect to TCP port
      # 5554"). Reclaim space by removing large preinstalled toolchains we don't
      # use before building.
      - name: Free disk space
        run: |
          echo "Disk before cleanup:"; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
            /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/local/share/chromium \
            /usr/lib/jvm /usr/local/lib/node_modules 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          echo "Disk after cleanup:"; df -h /

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache fetched logos
        uses: actions/cache@v4
        with:
          path: assets/logos
          key: logos-${{ hashFiles('src/config/shops/*.yaml') }}

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Android (Debug)
        run: cd android && ./gradlew assembleDebug

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/flows/ --format junit --output report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-android-results
          path: report.xml
