name: E2E Android

on:
  push:
    branches: [main, initial]
  pull_request:
    branches: [main, initial]

jobs:
  # ──────────────────────────────────────────────────────────
  # E2E Tests - Android (Maestro)
  # ──────────────────────────────────────────────────────────
  e2e-android:
    name: E2E Tests (Android)
    runs-on: ubuntu-latest
    # Opt out of Maestro's anonymous analytics for all steps in this job.
    env:
      MAESTRO_CLI_NO_ANALYTICS: '1'
    steps:

      - uses: actions/checkout@v4

      # The Ubuntu runner's disk fills up: a full prebuild + gradle build (NDK,
      # CMake, build-tools, a ~230MB APK and Gradle caches) leaves too little
      # room for the emulator system image, which then fails with "No space left
      # on device" and the emulator never boots ("could not connect to TCP port
      # 5554"). Reclaim space by removing large preinstalled toolchains we don't
      # use before building.
      - name: Free disk space
        run: |
          echo "Disk before cleanup:"; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
            /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/local/share/chromium \
            /usr/lib/jvm /usr/local/lib/node_modules 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          echo "Disk after cleanup:"; df -h /

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Cache the Gradle dependency/build caches and wrapper. `android/` itself
      # is regenerated by `expo prebuild --clean` every run, so we can't cache
      # the project dir — but ~/.gradle (downloaded deps, transforms, wrapper
      # dists) is stable across runs and is the bulk of the cold-build cost.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache fetched logos
        uses: actions/cache@v4
        with:
          path: assets/logos
          key: logos-v2-${{ hashFiles('src/config/shops/*.yaml') }}

      # Cache the Maestro CLI so we skip the network install on cache hits.
      - name: Cache Maestro CLI
        id: cache-maestro
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}-v1

      - run: npm ci
      - run: npm run generate:shops
      - run: npm run generate:icons
      - run: npm run fetch:logos

      - name: Install Maestro
        if: steps.cache-maestro.outputs.cache-hit != 'true'
        run: curl -fsSL "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Fingerprint-based APK caching ──────────────────────────────────────
      # The Gradle release build takes ~21 min. To avoid rebuilding when only JS
      # changes (which don't affect the native binary since we bundle JS into the
      # APK at build time), we cache the final APK keyed on files that affect the
      # native build: package-lock.json, app.json, native plugins, etc.
      # When the fingerprint matches we skip prebuild+build entirely.
      # Compute the fingerprint from the *committed* tree (git ls-tree -r HEAD
      # lists blob object IDs) so it's fully deterministic and immune to
      # working-tree mutations from earlier steps (npm ci, generate:shops/icons,
      # fetch:logos). We exclude build-time artifacts that vary across runs:
      #   - *.generated.* (produced by generate:shops/icons)
      #   - assets/logos/** (fetched by fetch:logos; Google returns varying bytes)
      # Identical committed source ⇒ identical key ⇒ the ~21m build is skipped.
      - name: Compute build fingerprint
        id: build-fingerprint
        run: |
          HASH=$(git ls-tree -r HEAD -- \
            src/ assets/ app.json package-lock.json index.ts App.tsx scripts/ \
            | grep -vE '\.generated\.|assets/logos/' \
            | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Build fingerprint: $HASH"

      - name: Cache Android APK
        id: cache-apk
        uses: actions/cache@v4
        with:
          path: cached-apk/app-release.apk
          key: android-apk-${{ steps.build-fingerprint.outputs.hash }}

      - name: Prebuild Android
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --clean

      # Build *Release*, not Debug. A Debug RN/Expo build loads its JS bundle
      # from a running Metro server; CI has no Metro, so a Debug app launches to
      # a blank screen and every Maestro assertion fails. The release build runs
      # the bundle/hermes task, embedding the JS into the APK so it's
      # self-contained. Expo prebuild wires the `release` buildType to the debug
      # signing config, so the APK is installable without extra signing secrets.
      - name: Build Android (Release)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: |
          cd android && ./gradlew assembleRelease \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.workers.max=4 \
            -Dorg.gradle.daemon=false \
            --no-configuration-cache

      - name: Store APK in cache dir
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: |
          mkdir -p cached-apk
          cp android/app/build/outputs/apk/release/app-release.apk cached-apk/app-release.apk

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install "$( [ -f cached-apk/app-release.apk ] && echo cached-apk/app-release.apk || echo android/app/build/outputs/apk/release/app-release.apk )"

            # Pass the flow files explicitly so they run sequentially in order.
            # Flows 02–08 are stateful (02 adds the card 03/04/05 use), so they
            # can't run as an unordered workspace. Flow 10 (import-vouchervault)
            # is portable (paste-only) so it's included; only 09 is omitted (it
            # needs a non-portable addMedia fixture + hardcoded gallery date).

            # NOTE: keep this on a SINGLE line — the emulator-runner action does
            # not run this as a normal multi-line bash script, so backslash line
            # continuations get mangled (Maestro then sees a literal `\` flow
            # path: "Flow path does not exist: …/\").
            maestro test .maestro/flows/01-country-selection.yaml .maestro/flows/02-add-card.yaml .maestro/flows/03-view-card-detail.yaml .maestro/flows/04-edit-card.yaml .maestro/flows/05-delete-card.yaml .maestro/flows/06-grid-view-toggle.yaml .maestro/flows/07-search-shops.yaml .maestro/flows/08-settings.yaml .maestro/flows/10-import-vouchervault.yaml --format junit --output report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-android-results
          path: report.xml
