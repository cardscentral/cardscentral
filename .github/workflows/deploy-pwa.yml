name: Deploy PWA (GitHub Pages)

# Builds the installable web app (PWA) and publishes it to GitHub Pages for
# free — no Apple Developer / Play Store fees needed to reach users. iOS/Android
# users can "Add to Home Screen" and use it like a native app (offline-capable).
#
# We publish TWO stages to the SAME GitHub Pages site (one Pages site per repo),
# as sibling paths so they update independently and never clobber each other:
#
#   QA   → https://<owner>.github.io/cardscentral/qa/   (deployed on every push
#          to `main`, so QA always tracks the latest merged code)
#   Prod → https://<owner>.github.io/cardscentral/      (deployed ONLY when a
#          GitHub Release is published — releases are cut from a git tag, so the
#          live prod site always corresponds to a tagged, released version)
#
# How it works: instead of the single-artifact `deploy-pages` action (which
# replaces the whole site on every run), we publish to a `gh-pages` branch with
# `peaceiris/actions-gh-pages`. QA writes into the `qa/` subdirectory and prod
# into the root; `keep_files: true` means a QA deploy never removes prod (and
# vice-versa). GitHub Pages then serves the branch.
#
# To ship a new PROD version:
#   1. git tag vX.Y.Z && git push origin vX.Y.Z
#   2. Create a GitHub Release for that tag (UI or `gh release create vX.Y.Z`).
#
# One-time setup: repo Settings → Pages → Source = "Deploy from a branch",
# Branch = `gh-pages` / `(root)`.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      stage:
        description: 'Which stage to deploy'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - prod

permissions:
  contents: write

concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # QA — deployed from `main` (latest merged code). Lives under /cardscentral/qa/.
  # ---------------------------------------------------------------------------
  deploy-qa:
    name: Deploy QA (main → /qa/)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'qa')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web PWA (QA)
        run: npm run build:web
        env:
          BASE_PATH: /cardscentral/qa/

      - name: Publish QA to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: qa
          keep_files: true
          commit_message: 'deploy(qa): ${{ github.sha }}'

  # ---------------------------------------------------------------------------
  # Prod — deployed ONLY on a published Release. Lives at /cardscentral/.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy Prod (release → /)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'prod')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web PWA (Prod)
        run: npm run build:web
        env:
          BASE_PATH: /cardscentral/

      - name: Publish Prod to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Root of the site, but keep the qa/ subdirectory intact.
          keep_files: true
          exclude_assets: ''
          commit_message: 'deploy(prod): ${{ github.ref_name }}'
