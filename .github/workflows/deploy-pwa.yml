name: Deploy PWA (GitHub Pages)

# Builds the installable web app (PWA) and publishes it to GitHub Pages for
# free — no Apple Developer / Play Store fees needed to reach users. iOS/Android
# users can "Add to Home Screen" and use it like a native app (offline-capable).
#
# Everything lives on the SAME GitHub Pages site (one Pages site per repo), as
# sibling paths so each piece updates independently and never clobbers another:
#
#   Landing → https://<owner>.github.io/cardscentral/       (site root — the
#             marketing page; every CTA links to the PROD app at /app/. Deployed
#             ONLY when a GitHub Release is published)
#   Prod    → https://<owner>.github.io/cardscentral/app/   (the PWA; deployed
#             ONLY when a GitHub Release is published — releases are cut from a
#             git tag, so prod always corresponds to a tagged, released version)
#   QA      → https://<owner>.github.io/cardscentral/qa/    (the PWA; deployed on
#             every push to `main`, so QA always tracks the latest merged code)
#
# How it works: instead of the single-artifact `deploy-pages` action (which
# replaces the whole site on every run), we publish to a `gh-pages` branch with
# `peaceiris/actions-gh-pages`. Each target writes into its own subdirectory
# (or the root, for landing) and `keep_files: true` means one deploy never
# removes another. GitHub Pages then serves the branch.
#
# To ship a new PROD version (updates both /app/ and the landing page):
#   1. git tag vX.Y.Z && git push origin vX.Y.Z
#   2. Create a GitHub Release for that tag (UI or `gh release create vX.Y.Z`).
#
# One-time setup: repo Settings → Pages → Source = "Deploy from a branch",
# Branch = `gh-pages` / `(root)`.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      stage:
        description: 'Which stage to deploy'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - prod
          - landing


permissions:
  contents: write

concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # QA — deployed from `main` (latest merged code). Lives at /cardscentral/qa/.
  # ---------------------------------------------------------------------------
  deploy-qa:
    name: Deploy QA (main → /qa/)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'qa')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web PWA (QA)
        run: npm run build:web
        env:
          BASE_PATH: /cardscentral/qa/

      - name: Publish QA to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: qa
          keep_files: true
          commit_message: 'deploy(qa): ${{ github.sha }}'

  # ---------------------------------------------------------------------------
  # Prod — the PWA, deployed ONLY on a published Release. Lives at
  # /cardscentral/app/ (the site root is the marketing landing page).
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy Prod (release → /app/)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'prod')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web PWA (Prod)
        run: npm run build:web
        env:
          BASE_PATH: /cardscentral/app/

      - name: Publish Prod to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: app
          keep_files: true
          commit_message: 'deploy(prod): ${{ github.ref_name }}'

  # ---------------------------------------------------------------------------
  # Landing — static marketing site served at the SITE ROOT (/cardscentral/).
  # Deployed ONLY on a published Release (same cadence as prod) because every
  # call-to-action links to the PROD app at /app/. Screens are regenerated so
  # the page always matches the current brand/icon.
  # ---------------------------------------------------------------------------
  deploy-landing:
    name: Deploy Landing (release → /)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'landing')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate landing screenshots (brand-consistent)
        run: npm run generate:landing

      - name: Publish Landing to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./landing
          # Site root. keep_files:true preserves the app/ and qa/ subdirectories.
          keep_files: true
          commit_message: 'deploy(landing): ${{ github.ref_name }}'
